# =============================================================================
# Gmail -> Apple Mail Push Bridge — ZimaOS / copy-paste edition
#
# Self-contained: pulls prebuilt images from GHCR, no build contexts, no .env.
# Uses explicit bind-mounts under /DATA/AppData/gmail-push so ZimaOS shows the
# folders (named volumes don't appear in the ZimaOS UI and may not auto-create).
#
# BEFORE INSTALL, create the folders once over SSH:
#   sudo mkdir -p /DATA/AppData/gmail-push/{mail,zpush-state,caddy-data,caddy-config}
#
# Then edit the values marked  # <-- CHANGE  and paste into
# ZimaOS -> Apps -> Custom Install (Import / docker-compose).
#
# PREREQS:
#   * The three ghcr.io/akvaithi/gmail-push-* packages must be PUBLIC.
#   * A public DNS name -> your IP (grey cloud / DNS only), and the router
#     forwarding external 80 -> host:8080 and 443 -> host:8443 (Caddy binds
#     8080/8443 because ZimaOS's own UI holds 80/443). iOS needs HTTPS on 443.
# =============================================================================

name: gmail-push

networks:
  bridge:

services:
  # IMAP IDLE watcher -> mbsync into the shared Maildir
  watcher:
    image: ghcr.io/akvaithi/gmail-push-watcher:latest
    restart: unless-stopped
    environment:
      GMAIL_ADDRESS: "you@gmail.com"              # <-- CHANGE
      GMAIL_APP_PASSWORD: "xxxxxxxxxxxxxxxx"       # <-- CHANGE  (16-char App Password)
      SYNC_INTERVAL: "45"
    volumes:
      - /DATA/AppData/gmail-push/mail:/mail
    networks: [bridge]

  # Local IMAP over the Maildir (what iOS actually reads, via Z-Push)
  dovecot:
    image: ghcr.io/akvaithi/gmail-push-dovecot:latest
    restart: unless-stopped
    environment:
      LOCAL_BRIDGE_USER: "bridgeuser"             # <-- CHANGE  (you invent this; iOS username)
      LOCAL_BRIDGE_PASS: "pick-a-long-random-pw"  # <-- CHANGE  (you invent this; iOS password)
    volumes:
      - /DATA/AppData/gmail-push/mail:/mail       # SAME host path as watcher
    networks: [bridge]

  # Send-only relay: outbound mail from iOS goes out through Gmail's SMTP
  postfix:
    image: boky/postfix:v5.1.0
    restart: unless-stopped
    environment:
      ALLOWED_SENDER_DOMAINS: "gmail.com"
      RELAYHOST: "[smtp.gmail.com]:587"
      RELAYHOST_USERNAME: "you@gmail.com"         # <-- CHANGE  (same Gmail address)
      RELAYHOST_PASSWORD: "xxxxxxxxxxxxxxxx"       # <-- CHANGE  (same App Password)
      POSTFIX_smtp_tls_security_level: "encrypt"
      MASQUERADED_DOMAINS: "gmail.com"
    networks: [bridge]

  # Exchange ActiveSync front end (this is what pushes to iOS)
  zpush:
    image: ghcr.io/akvaithi/gmail-push-zpush:latest
    restart: unless-stopped
    environment:
      PING_INTERVAL: "30"
    volumes:
      - /DATA/AppData/gmail-push/zpush-state:/var/lib/z-push
    networks: [bridge]
    depends_on: [dovecot, postfix]

  # Public TLS termination (auto Let's Encrypt cert for your domain)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # List form (not a plain string): some importers (e.g. ZimaOS/CasaOS) don't
    # shell-split a string command, which makes Caddy fail to start.
    command: ["reverse-proxy", "--from", "https://push.example.com", "--to", "zpush:80"]  # <-- CHANGE domain
    ports:
      - "8080:80"     # router maps public 80  -> here
      - "8443:443"    # router maps public 443 -> here
    volumes:
      - /DATA/AppData/gmail-push/caddy-data:/data
      - /DATA/AppData/gmail-push/caddy-config:/config
    networks: [bridge]
    depends_on: [zpush]
