# Minimal Dovecot: serve the shared Maildir over plain IMAP to Z-Push only.
# Not exposed publicly (docker-internal network); TLS is terminated at Caddy.

protocols = imap
listen = *

mail_location = maildir:/mail
# Serve mail as a normal uid (dovecot refuses to run the mail process as root).
# The entrypoint chowns /mail to this uid, and the watcher hands ownership of
# newly-synced mail to it after every mbsync run.
mail_uid = 1000
mail_gid = 1000
first_valid_uid = 1000
first_valid_gid = 1000

auth_mechanisms = plain login
disable_plaintext_auth = no

passdb {
  driver = passwd-file
  args = scheme=PLAIN /etc/dovecot/users
}
userdb {
  driver = static
  args = uid=1000 gid=1000 home=/mail
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

ssl = no
log_path = /dev/stderr
info_log_path = /dev/stderr
