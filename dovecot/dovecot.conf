# Minimal Dovecot: serve the shared Maildir over plain IMAP to Z-Push only.
# Not exposed publicly (docker-internal network); TLS is terminated at Caddy.

protocols = imap
listen = *

mail_location = maildir:/mail
# Single-user appliance: serve as root so files written by the watcher
# (root-owned in the shared volume) are readable without uid juggling.
mail_uid = 0
mail_gid = 0
first_valid_uid = 0
first_valid_gid = 0

auth_mechanisms = plain login
disable_plaintext_auth = no

passdb {
  driver = passwd-file
  args = scheme=PLAIN /etc/dovecot/users
}
userdb {
  driver = static
  args = uid=0 gid=0 home=/mail
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

ssl = no
log_path = /dev/stderr
info_log_path = /dev/stderr
