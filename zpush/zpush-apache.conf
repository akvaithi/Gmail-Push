<VirtualHost *:80>
    DocumentRoot /var/www/html

    # EAS endpoint iOS talks to.
    Alias /Microsoft-Server-ActiveSync /var/www/html/index.php
    # Optional Autodiscover (manual iOS setup does not require it).
    Alias /autodiscover/autodiscover.xml /var/www/html/autodiscover/autodiscover.php
    Alias /Autodiscover/Autodiscover.xml /var/www/html/autodiscover/autodiscover.php

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        # EAS payloads can be large; don't let PHP choke on them.
        php_admin_value post_max_size 30M
        php_admin_value upload_max_filesize 30M
    </Directory>

    LogLevel warn
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
